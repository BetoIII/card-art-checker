<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain — Iframe Diagnostic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif; padding: 24px; background: #FFFFFF; color: #000000; -webkit-font-smoothing: antialiased; }
    h2 { margin-top: 0; font-size: 20px; font-weight: 600; }
    pre { background: #FFFFFF; border: 1px solid #D8DCDF; border-radius: 8px; padding: 16px; overflow-x: auto; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
    .section { margin-bottom: 20px; }
    .label { font-weight: 600; color: #121212; margin-bottom: 4px; font-size: 14px; letter-spacing: 0.6px; }
  </style>
</head>
<body>
  <h2>Rocketlane Iframe Diagnostic</h2>
  <div class="section">
    <div class="label">Full URL:</div>
    <pre id="url"></pre>
  </div>
  <div class="section">
    <div class="label">Query Parameters:</div>
    <pre id="params"></pre>
  </div>
  <div class="section">
    <div class="label">Referrer:</div>
    <pre id="referrer"></pre>
  </div>
  <div class="section">
    <div class="label">Embedded in iframe:</div>
    <pre id="iframe"></pre>
  </div>
  <script>
    document.getElementById('url').textContent = location.href;
    document.getElementById('params').textContent = JSON.stringify(
      Object.fromEntries(new URLSearchParams(location.search)), null, 2
    );
    document.getElementById('referrer').textContent = document.referrer || '(empty)';
    document.getElementById('iframe').textContent = String(window.self !== window.top);
  </script>
</body>
</html>
